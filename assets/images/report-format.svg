<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700">Output Report Format</text>
  <text x="450" y="52" text-anchor="middle" fill="#8b949e" font-size="12">Structured threat intelligence report delivered via Telegram — 8 components</text>

  <!-- ===== Component 1: Header ===== -->
  <rect x="30" y="75" width="840" height="55" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="50" y="95" fill="#3fb950" font-size="11" font-weight="600">① HEADER</text>
  <text x="50" y="112" fill="#c9d1d9" font-size="11">Product name, version, analysis timestamp</text>
  <text x="50" y="125" fill="#8b949e" font-size="10">Example: "Product: Microsoft Exchange Server 2019 | Version: 2019"</text>

  <!-- ===== Component 2: Threat Level ===== -->
  <rect x="30" y="140" width="410" height="55" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>
  <text x="50" y="160" fill="#f85149" font-size="11" font-weight="600">② THREAT LEVEL</text>
  <text x="50" y="177" fill="#c9d1d9" font-size="11">🔴 High / 🟠 Medium / 🟢 Low / ⚪ Unknown</text>
  <text x="50" y="190" fill="#8b949e" font-size="10">Auto-scored by LLM based on report keywords (critical, severe, moderate, benign)</text>

  <!-- ===== Component 3: Key Vulnerabilities ===== -->
  <rect x="450" y="140" width="420" height="90" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="470" y="160" fill="#bc8cff" font-size="11" font-weight="600">③ KEY VULNERABILITIES</text>
  <text x="470" y="177" fill="#c9d1d9" font-size="11">CVE ID, CVSS score, type, severity, patch KB, date</text>
  <text x="470" y="192" fill="#8b949e" font-size="10">Sourced from CISA KEV + AlienVault OTX + Perplexity AI</text>
  <text x="470" y="207" fill="#8b949e" font-size="10">Formatted as: CVE-ID | Type | Severity | KB | Date</text>
  <text x="470" y="220" fill="#6C7883" font-size="9">Example: CVE-2025-53786 | EoP | CVSS 8.0 | KB5063221 | Aug 2025</text>

  <!-- ===== Component 4: Active Threats ===== -->
  <rect x="30" y="240" width="410" height="75" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="50" y="260" fill="#d29922" font-size="11" font-weight="600">④ ACTIVE THREATS &amp; EXPLOITS</text>
  <text x="50" y="277" fill="#c9d1d9" font-size="11">Web shells, NTLM relay, scanning activity, TTPs</text>
  <text x="50" y="292" fill="#8b949e" font-size="10">AI-summarized from Perplexity threat context + citation sources</text>
  <text x="50" y="305" fill="#6C7883" font-size="9">Example: "Web shell deployment in OWA directories", "Active ProxyShell scanning"</text>

  <!-- ===== Component 5: IOC Summary ===== -->
  <rect x="450" y="240" width="420" height="75" rx="8" fill="#161b22" stroke="#39c5cf" stroke-width="1.5"/>
  <text x="470" y="260" fill="#39c5cf" font-size="11" font-weight="600">⑤ IOC INDICATOR SUMMARY</text>
  <text x="470" y="277" fill="#c9d1d9" font-size="11">CVEs, IPs, domains, file hashes with counts</text>
  <text x="470" y="292" fill="#8b949e" font-size="10">Extracted from citations → Enriched via VT, AbuseIPDB, HA</text>
  <text x="470" y="305" fill="#6C7883" font-size="9">Example: "CVEs: 16 | Malicious IPs: 3 (score&gt;75) | Domains: 5 | Hashes: 2"</text>

  <!-- ===== Component 6: Risk Assessment ===== -->
  <rect x="30" y="325" width="410" height="75" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="50" y="345" fill="#e3b341" font-size="11" font-weight="600">⑥ RISK ASSESSMENT</text>
  <text x="50" y="362" fill="#c9d1d9" font-size="11">Patch priority, exposure analysis, hardening status</text>
  <text x="50" y="377" fill="#8b949e" font-size="10">LLM-generated based on all correlated vulnerability + enrichment data</text>
  <text x="50" y="390" fill="#6C7883" font-size="9">Example: "No active IOCs detected. Apply CU15 to mitigate 2025 CVEs."</text>

  <!-- ===== Component 7: Recommendations ===== -->
  <rect x="450" y="325" width="420" height="75" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="470" y="345" fill="#3fb950" font-size="11" font-weight="600">⑦ RECOMMENDATIONS</text>
  <text x="470" y="362" fill="#c9d1d9" font-size="11">Prioritized action items (patch, monitor, harden)</text>
  <text x="470" y="377" fill="#8b949e" font-size="10">Numbered list generated by LLM from correlated findings</text>
  <text x="470" y="390" fill="#6C7883" font-size="9">Example: "1. Apply CU15 2. Enable Extended Protection 3. Monitor OWA"</text>

  <!-- ===== Component 8: Source Citations ===== -->
  <rect x="30" y="410" width="840" height="65" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="50" y="430" fill="#8b949e" font-size="11" font-weight="600">⑧ SOURCE CITATIONS</text>
  <text x="50" y="447" fill="#c9d1d9" font-size="11">🔗 Clickable links to all referenced threat intelligence sources</text>
  <text x="50" y="462" fill="#6C7883" font-size="10">Perplexity citations + search results: CISA, Microsoft Security Blog, Kaspersky, Dark Reading, OTX pulses...</text>

  <!-- ===== Formatting Pipeline ===== -->
  <rect x="30" y="490" width="840" height="80" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="510" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">REPORT FORMATTING PIPELINE</text>

  <rect x="50" y="525" width="120" height="30" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="110" y="544" text-anchor="middle" fill="#d29922" font-size="9">Raw LLM Output</text>
  <line x1="170" y1="540" x2="195" y2="540" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="192,535 198,540 192,545" fill="#30363d"/>

  <rect x="200" y="525" width="120" height="30" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="260" y="538" text-anchor="middle" fill="#d29922" font-size="9">Remove Markdown</text>
  <text x="260" y="549" text-anchor="middle" fill="#6C7883" font-size="8">**bold**, # headers</text>
  <line x1="320" y1="540" x2="345" y2="540" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="342,535 348,540 342,545" fill="#30363d"/>

  <rect x="350" y="525" width="120" height="30" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="410" y="538" text-anchor="middle" fill="#d29922" font-size="9">Tables → Bullets</text>
  <text x="410" y="549" text-anchor="middle" fill="#6C7883" font-size="8">| col | → • col</text>
  <line x1="470" y1="540" x2="495" y2="540" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="492,535 498,540 492,545" fill="#30363d"/>

  <rect x="500" y="525" width="120" height="30" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="560" y="538" text-anchor="middle" fill="#d29922" font-size="9">Section Spacing</text>
  <text x="560" y="549" text-anchor="middle" fill="#6C7883" font-size="8">Add visual breaks</text>
  <line x1="620" y1="540" x2="645" y2="540" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="642,535 648,540 642,545" fill="#30363d"/>

  <rect x="650" y="525" width="120" height="30" rx="6" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="710" y="538" text-anchor="middle" fill="#3fb950" font-size="9">Truncate</text>
  <text x="710" y="549" text-anchor="middle" fill="#6C7883" font-size="8">Max 4000 chars</text>
  <line x1="770" y1="540" x2="795" y2="540" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="792,535 798,540 792,545" fill="#30363d"/>

  <rect x="800" y="525" width="55" height="30" rx="6" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="827" y="544" text-anchor="middle" fill="#3fb950" font-size="9">Send</text>

  <!-- Footer -->
  <text x="450" y="665" text-anchor="middle" fill="#484f58" font-size="11">Output is a clean, Telegram-optimized Markdown report — no raw JSON, no API artifacts</text>
</svg>

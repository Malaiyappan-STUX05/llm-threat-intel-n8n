  <line x1="340" y1="91" x2="360" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="360" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#39c5cf" stroke-width="1.5"/>
  <text x="405" y="88" text-anchor="middle" fill="#39c5cf" font-size="9" font-weight="600">Perplexity</text>

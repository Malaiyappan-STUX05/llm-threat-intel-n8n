  <text x="260" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Extract</text>
  <text x="260" y="268" text-anchor="middle" fill="#8b949e" font-size="8">Citations</text>

  <rect x="315" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="355" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Web</text>
  <text x="355" y="268" text-anchor="middle" fill="#8b949e" font-size="8">Scraping</text>

  <rect x="410" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Regex</text>
  <text x="450" y="268" text-anchor="middle" fill="#8b949e" font-size="8">IOC Parse</text>

  <rect x="505" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="545" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Switch</text>
  <text x="545" y="268" text-anchor="middle" fill="#8b949e" font-size="8">by Type</text>

  <rect x="600" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Merge</text>
  <text x="640" y="268" text-anchor="middle" fill="#8b949e" font-size="8">All IOCs</text>

  <rect x="695" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="735" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Format</text>
  <text x="735" y="268" text-anchor="middle" fill="#8b949e" font-size="8">for LLM</text>

  <rect x="790" y="240" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="830" y="256" text-anchor="middle" fill="#8b949e" font-size="8">Clean</text>
  <text x="830" y="268" text-anchor="middle" fill="#8b949e" font-size="8">Format</text>

  <!-- Legend -->
  <rect x="30" y="300" width="12" height="12" rx="2" fill="#238636"/>
  <text x="48" y="310" fill="#8b949e" font-size="9">Input/Output</text>
  <rect x="140" y="300" width="12" height="12" rx="2" fill="#8957e5"/>
  <text x="158" y="310" fill="#8b949e" font-size="9">Research</text>
  <rect x="240" y="300" width="12" height="12" rx="2" fill="#39c5cf"/>
  <text x="258" y="310" fill="#8b949e" font-size="9">AI/LLM</text>
  <rect x="330" y="300" width="12" height="12" rx="2" fill="#d29922"/>
  <text x="348" y="310" fill="#8b949e" font-size="9">Extraction</text>
  <rect x="430" y="300" width="12" height="12" rx="2" fill="#da3633"/>
  <text x="448" y="310" fill="#8b949e" font-size="9">Enrichment</text>
  <rect x="530" y="300" width="12" height="12" rx="2" fill="#e3b341"/>
  <text x="548" y="310" fill="#8b949e" font-size="9">Correlation</text>

  <line x1="670" y1="91" x2="690" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="690" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>

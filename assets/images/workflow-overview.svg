  <line x1="560" y1="91" x2="580" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="580" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#da3633" stroke-width="1.5"/>

  <line x1="450" y1="91" x2="470" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="470" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>

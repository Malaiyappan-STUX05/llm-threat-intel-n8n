  <rect x="30" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="75" y="88" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600">Telegram</text>
  <text x="75" y="102" text-anchor="middle" fill="#8b949e" font-size="8">Trigger</text>
  <line x1="120" y1="91" x2="140" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="140" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="185" y="88" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600">Input</text>
  <text x="185" y="102" text-anchor="middle" fill="#8b949e" font-size="8">Validation</text>
  <line x1="230" y1="91" x2="250" y2="91" stroke="#30363d" stroke-width="1.5"/>

  <rect x="250" y="70" width="90" height="42" rx="6" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>

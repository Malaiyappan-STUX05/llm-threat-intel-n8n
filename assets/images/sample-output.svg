      <stop offset="0%" stop-color="#1B2836"/>
      <stop offset="100%" stop-color="#17212B"/>
    </linearGradient>
  </defs>

  <!-- Phone background -->
  <rect width="420" height="680" rx="16" fill="url(#tgBg)"/>

  <!-- Header -->

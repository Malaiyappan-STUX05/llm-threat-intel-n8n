<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="tgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2836"/>
      <stop offset="100%" stop-color="#17212B"/>
    </linearGradient>
  </defs>

  <!-- Phone background -->
  <rect width="400" height="520" rx="16" fill="url(#tgBg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="50" rx="16" fill="#1B2836"/>
  <rect x="0" y="34" width="400" height="16" fill="#1B2836"/>
  <circle cx="24" cy="25" r="14" fill="#2AABEE"/>
  <text x="46" y="29" fill="#FFFFFF" font-size="13" font-weight="600">Threat Intel Bot</text>
  <text x="350" y="29" fill="#6C7883" font-size="11">online</text>

  <!-- User message (right) -->
  <rect x="160" y="65" width="220" height="32" rx="8" fill="#2B5278"/>
  <text x="170" y="80" fill="#FFFFFF" font-size="11">analyze latest threat intel on</text>
  <text x="170" y="93" fill="#FFFFFF" font-size="11">Microsoft Exchange Server 2019</text>

  <!-- Bot response (left) -->
  <rect x="20" y="115" width="360" height="385" rx="8" fill="#182533"/>

  <!-- Report content -->
  <text x="35" y="140" fill="#FFFFFF" font-size="12" font-weight="600">🔴 THREAT INTELLIGENCE SUMMARY</text>
  <text x="35" y="158" fill="#6C7883" font-size="10">Product: Microsoft Exchange Server 2019</text>
  <text x="35" y="172" fill="#6C7883" font-size="10">Threat Level: 🔴 High</text>

  <text x="35" y="195" fill="#5288C1" font-size="11" font-weight="600">KEY VULNERABILITIES</text>
  <text x="35" y="210" fill="#E8E8E8" font-size="10">• CVE-2025-53786 (CVSS 8.0) — Privilege escalation</text>
  <text x="35" y="222" fill="#E8E8E8" font-size="10">• CVE-2025-25005 — Server tampering</text>
  <text x="35" y="234" fill="#E8E8E8" font-size="10">• CVE-2025-25006 — Spoofing vulnerability</text>
  <text x="35" y="246" fill="#E8E8E8" font-size="10">• CVE-2025-25007 — Tampering vulnerability</text>

  <text x="35" y="268" fill="#5288C1" font-size="11" font-weight="600">ACTIVE THREATS</text>
  <text x="35" y="283" fill="#E8E8E8" font-size="10">• Web shell deployment in OWA directories</text>
  <text x="35" y="295" fill="#E8E8E8" font-size="10">• NTLM relay &amp; Adversary-in-the-Middle attacks</text>
  <text x="35" y="307" fill="#E8E8E8" font-size="10">• Active scanning for ProxyShell servers</text>
  <text x="35" y="319" fill="#E8E8E8" font-size="10">• Mail flow rule injection via EWS</text>

  <text x="35" y="341" fill="#5288C1" font-size="11" font-weight="600">IOC SUMMARY</text>
  <text x="35" y="356" fill="#E8E8E8" font-size="10">• CVEs: 16 identified</text>
  <text x="35" y="368" fill="#E8E8E8" font-size="10">• Malicious IPs: 3 flagged (score &gt; 75)</text>
  <text x="35" y="380" fill="#E8E8E8" font-size="10">• Suspicious Domains: 5 detected</text>
  <text x="35" y="392" fill="#E8E8E8" font-size="10">• File Hashes: 2 malware samples</text>

  <text x="35" y="414" fill="#5288C1" font-size="11" font-weight="600">RECOMMENDATIONS</text>
  <text x="35" y="429" fill="#E8E8E8" font-size="10">1. Apply CU15 (KB5071875) immediately</text>
  <text x="35" y="441" fill="#E8E8E8" font-size="10">2. Enable Extended Protection</text>
  <text x="35" y="453" fill="#E8E8E8" font-size="10">3. Monitor suspicious OWA requests</text>
  <text x="35" y="465" fill="#E8E8E8" font-size="10">4. Verify Exchmem.dll ≥ 15.2.1748.36</text>

  <!-- Sources link -->
  <text x="35" y="485" fill="#5288C1" font-size="10">📎 Sources: CISA, Microsoft, Kaspersky...</text>

  <!-- Timestamp -->
  <text x="340" y="490" fill="#6C7883" font-size="9">14:32 ✓✓</text>
</svg>

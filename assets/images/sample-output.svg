  <rect x="20" y="162" width="380" height="500" rx="8" fill="#182533"/>

  <!-- Report content -->
  <text x="35" y="184" fill="#FFFFFF" font-size="12" font-weight="700">🔴 THREAT INTELLIGENCE SUMMARY</text>

  <text x="35" y="202" fill="#6C7883" font-size="10">━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="35" y="216" fill="#E8E8E8" font-size="10">Product: Microsoft Exchange Server 2019</text>
  <text x="35" y="228" fill="#E8E8E8" font-size="10">Version: 2019 (CU14)</text>
  <text x="35" y="240" fill="#E8E8E8" font-size="10">Threat Level: 🔴 High</text>

  <text x="35" y="260" fill="#5288C1" font-size="11" font-weight="600">KEY VULNERABILITIES</text>
  <text x="35" y="274" fill="#E8E8E8" font-size="10">• CVE-2025-53786 — EoP, CVSS 8.0, KB5063221</text>
  <text x="35" y="286" fill="#E8E8E8" font-size="10">• CVE-2025-25005 — Tampering, Aug 2025</text>
  <text x="35" y="298" fill="#E8E8E8" font-size="10">• CVE-2025-25006 — Spoofing, Aug 2025</text>
  <text x="35" y="310" fill="#E8E8E8" font-size="10">• CVE-2025-25007 — Tampering, Aug 2025</text>
  <text x="35" y="322" fill="#E8E8E8" font-size="10">• CVE-2025-33051 — Info Disclosure, Aug 2025</text>

  <text x="35" y="342" fill="#5288C1" font-size="11" font-weight="600">ACTIVE THREATS</text>
  <text x="35" y="356" fill="#E8E8E8" font-size="10">• Web shell deployment in OWA directories</text>
  <text x="35" y="368" fill="#E8E8E8" font-size="10">• NTLM relay &amp; Adversary-in-the-Middle</text>
  <text x="35" y="380" fill="#E8E8E8" font-size="10">• Active scanning for ProxyShell servers</text>
  <text x="35" y="392" fill="#E8E8E8" font-size="10">• Mail flow rule injection via EWS</text>

  <text x="35" y="412" fill="#5288C1" font-size="11" font-weight="600">IOC SUMMARY</text>
  <text x="35" y="426" fill="#E8E8E8" font-size="10">• CVEs: 16 identified</text>
  <text x="35" y="438" fill="#E8E8E8" font-size="10">• Malicious IPs: 3 (AbuseIPDB score &gt; 75)</text>
  <text x="35" y="450" fill="#E8E8E8" font-size="10">• Suspicious Domains: 5 (VT detected)</text>
  <text x="35" y="462" fill="#E8E8E8" font-size="10">• File Hashes: 2 malware samples (HA confirmed)</text>

  <text x="35" y="482" fill="#5288C1" font-size="11" font-weight="600">RISK ASSESSMENT</text>
  <text x="35" y="496" fill="#E8E8E8" font-size="10">No active IOCs in environment. Unpatched</text>
  <text x="35" y="508" fill="#E8E8E8" font-size="10">systems vulnerable to spoofing/EoP → RCE.</text>
  <text x="35" y="520" fill="#E8E8E8" font-size="10">Patch priority: CRITICAL.</text>

  <text x="35" y="540" fill="#5288C1" font-size="11" font-weight="600">RECOMMENDATIONS</text>
  <text x="35" y="554" fill="#E8E8E8" font-size="10">1. Apply CU15 (KB5071875) immediately</text>
  <text x="35" y="566" fill="#E8E8E8" font-size="10">2. Enable Extended Protection for auth</text>
  <text x="35" y="578" fill="#E8E8E8" font-size="10">3. Monitor suspicious OWA requests</text>
  <text x="35" y="590" fill="#E8E8E8" font-size="10">4. Verify Exchmem.dll ≥ 15.2.1748.36</text>

  <text x="35" y="610" fill="#5288C1" font-size"10">📎 Sources</text>
  <text x="35" y="622" fill="#5288C1" font-size="9">CISA • Microsoft • Kaspersky • Dark Reading</text>
  <text x="35" y="634" fill="#5288C1" font-size="9">OTX • VirusTotal • AbuseIPDB</text>

  <!-- Timestamp -->
  <text x="355" y="650" fill="#6C7883" font-size="9">14:32 ✓✓</text>
